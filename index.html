<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aestyx — Reach Your 100%</title>
  <meta name="description" content="The world's first AI aesthetics intelligence platform. World-class Brazilian specialists. Your best version awaits.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== V2: EARTHY PURPLE — MODERN SOPHISTICATION ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F4F3F5;
      --bg-2:      #EDECED;
      --bg-card:   #FFFFFF;
      --purple:    #4A3B4F;
      --purple-l:  #6D5B73;
      --purple-ll: #9A8A9F;
      --gold:      #C9B99C;
      --gold-l:    #E0D4C3;
      --lavender:  #B8AEBF;
      --text:      #1E1822;
      --text-s:    #5A5060;
      --white:     #FFFFFF;
      --banner-h:  38px;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── CONSTRUCTION BANNER ── */
    .construction-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 102;
      height: var(--banner-h);
      background: var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .phase-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(201,185,156,0.15);
      border: 1px solid rgba(201,185,156,0.45);
      color: var(--gold);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .phase-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .banner-text {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.7); }
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: var(--banner-h); left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5vw;
      height: 68px;
      background: rgba(244,243,245,0.9);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(74,59,79,0.08);
    }

    .nav-logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.26em;
      color: var(--purple);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }

    .nav-links { display: flex; gap: 2.2rem; list-style: none; }

    .nav-links a {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-s);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--purple); }

    .nav-right { display: flex; align-items: center; gap: 1rem; }

    .lang-selector { display: flex; gap: 4px; }

    .lang-btn {
      background: none;
      border: 1px solid rgba(74,59,79,0.18);
      color: var(--text-s);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 4px 9px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .lang-btn:hover { border-color: var(--purple); color: var(--purple); }
    .lang-btn.active { background: var(--purple); color: var(--white); border-color: var(--purple); }

    .nav-cta {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 22px;
      background: var(--purple);
      color: var(--white);
      text-decoration: none;
      border-radius: 4px;
      transition: background 0.25s, transform 0.2s;
    }

    .nav-cta:hover { background: var(--text); transform: translateY(-1px); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      padding: calc(var(--banner-h) + 110px) 5vw 80px;
      gap: 5rem;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(201,185,156,0.1);
      border: 1px solid rgba(201,185,156,0.35);
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 2rem;
    }

    .eyebrow-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: pulse-dot 2s ease-in-out infinite; }

    .hero h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2.6rem, 4.2vw, 4rem);
      font-weight: 700;
      line-height: 1.08;
      color: var(--text);
      margin-bottom: 1.8rem;
      letter-spacing: -0.025em;
    }

    .hero h1 .highlight {
      color: var(--purple);
      position: relative;
      display: inline-block;
    }

    .hero h1 .highlight::after {
      content: '';
      position: absolute;
      bottom: 3px; left: 0; right: 0;
      height: 2px;
      background: var(--gold);
    }

    .hero-sub {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-s);
      line-height: 1.85;
      margin-bottom: 2.4rem;
      max-width: 500px;
    }

    /* ── WAITLIST FORM ── */
    .waitlist-form {
      display: flex;
      gap: 10px;
      max-width: 460px;
    }

    .waitlist-input {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid rgba(74,59,79,0.2);
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .waitlist-input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(74,59,79,0.08); }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 15px 28px;
      background: var(--purple);
      color: var(--white);
      text-decoration: none;
      border-radius: 4px;
      border: 1px solid var(--purple);
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-primary:hover { background: var(--text); border-color: var(--text); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(74,59,79,0.2); }
    .btn-primary svg { width: 14px; height: 14px; }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 15px 32px;
      background: transparent;
      color: var(--purple);
      text-decoration: none;
      border-radius: 4px;
      border: 1px solid rgba(74,59,79,0.3);
      transition: border-color 0.25s, background 0.25s;
      cursor: pointer;
    }

    .btn-outline:hover { border-color: var(--purple); background: rgba(74,59,79,0.04); }

    .waitlist-success {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: var(--purple);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* ── HERO VISUAL: BLUEPRINT CARD ── */
    .hero-visual { position: relative; }

    .blueprint-card {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(74,59,79,0.12), 0 8px 24px rgba(74,59,79,0.06);
      border: 1px solid rgba(74,59,79,0.06);
    }

    .bp-header {
      background: var(--purple);
      padding: 22px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .bp-header-left { display: flex; align-items: center; gap: 12px; }

    .ui-dots { display: flex; gap: 6px; }
    .ui-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.22); }
    .ui-dot:first-child { background: rgba(255,255,255,0.6); }

    .bp-header-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }

    .bp-score-badge {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .bp-score-num {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .bp-score-lbl {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .bp-body { padding: 28px; }

    .bp-goal-tag {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bp-goal-tag::before { content: ''; width: 20px; height: 1px; background: var(--gold); }

    .bp-categories { display: flex; flex-direction: column; gap: 0; margin-bottom: 24px; }

    .bpc-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid var(--bg-2);
    }

    .bpc-row:last-child { border-bottom: none; }

    .bpc-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--purple);
      flex-shrink: 0;
    }

    .bpc-dot.secondary { background: var(--lavender); }

    .bpc-info { flex: 1; }

    .bpc-cat {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .bpc-proc { font-size: 0.72rem; color: var(--text-s); }

    .bpc-tag {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .tag-high { background: rgba(74,59,79,0.1); color: var(--purple); }
    .tag-med  { background: rgba(184,174,191,0.2); color: var(--purple-ll); }
    .tag-opt  { background: rgba(201,185,156,0.15); color: var(--gold); }

    .bp-cta-row {
      display: flex;
      gap: 8px;
    }

    .mini-btn {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: transform 0.2s;
    }

    .mini-btn:hover { transform: translateY(-1px); }
    .mini-btn.solid { background: var(--purple); color: var(--white); }
    .mini-btn.ghost { background: var(--bg); color: var(--purple); border: 1px solid rgba(74,59,79,0.18); }

    .floating-card {
      position: absolute;
      bottom: -20px; right: -20px;
      background: var(--white);
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 12px 32px rgba(74,59,79,0.12);
      border: 1px solid rgba(74,59,79,0.06);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .fc-icon { width: 36px; height: 36px; border-radius: 50%; background: rgba(74,59,79,0.08); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1rem; }
    .fc-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--purple-ll); }
    .fc-val { font-family: 'Montserrat', sans-serif; font-size: 0.92rem; font-weight: 700; color: var(--purple); }

    .hero-stat {
      position: absolute;
      top: 20px; left: -30px;
      background: var(--purple);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--white);
    }

    .stat-num { font-family: 'Montserrat', sans-serif; font-size: 1.5rem; font-weight: 700; }
    .stat-label { font-size: 0.62rem; color: rgba(255,255,255,0.55); letter-spacing: 0.08em; }

    /* ── SECTION SHARED ── */
    section { padding: 96px 5vw; }

    .section-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .section-kicker::before { content: ''; width: 24px; height: 1px; background: var(--gold); }

    .section-title {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(1.9rem, 2.8vw, 2.6rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 1.2rem;
    }

    .section-title .accent { color: var(--purple); }

    .section-lead {
      font-size: 0.95rem;
      color: var(--text-s);
      line-height: 1.85;
    }

    /* ── VALUE PROPS (ARBITRAGE) ── */
    .value-props { background: var(--white); }

    .vp-intro {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: end;
      margin-bottom: 4rem;
    }

    .vp-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .vp-card {
      background: var(--bg);
      border-radius: 16px;
      padding: 40px 32px;
      border: 1px solid transparent;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
      text-align: center;
      cursor: default;
    }

    .vp-card:hover { border-color: rgba(74,59,79,0.1); box-shadow: 0 12px 32px rgba(74,59,79,0.07); transform: translateY(-4px); }

    .vp-icon { font-size: 1.6rem; margin-bottom: 1.2rem; display: block; }

    .vp-number {
      font-family: 'Montserrat', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--purple);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .vp-unit { color: var(--gold); font-size: 1.8rem; }

    .vp-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .vp-desc { font-size: 0.8rem; color: var(--text-s); line-height: 1.75; }

    /* ── PATIENT JOURNEY ── */
    .journey { padding: 96px 5vw; }

    .journey-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: center;
      margin-top: 4rem;
    }

    .journey-steps { display: flex; flex-direction: column; gap: 0; }

    .js-item {
      display: flex;
      gap: 1.8rem;
      padding-bottom: 2.6rem;
    }

    .js-item:last-child { padding-bottom: 0; }

    .js-left { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }

    .js-node {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }

    .js-line { width: 1px; flex: 1; background: rgba(74,59,79,0.12); margin-top: 8px; }
    .js-item:last-child .js-line { display: none; }

    .js-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
      margin-top: 8px;
    }

    .js-desc { font-size: 0.85rem; color: var(--text-s); line-height: 1.78; }

    /* ── JOURNEY VISUAL CARD ── */
    .journey-visual { position: relative; }

    .j-card {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(74,59,79,0.06);
      box-shadow: 0 20px 60px rgba(74,59,79,0.1);
    }

    .jc-header {
      background: linear-gradient(135deg, var(--purple) 0%, #6D5B73 100%);
      padding: 32px 32px 28px;
      position: relative;
      overflow: hidden;
    }

    .jc-header::before {
      content: '✦';
      position: absolute;
      top: -10px; right: 20px;
      font-size: 6rem;
      color: rgba(255,255,255,0.04);
      pointer-events: none;
    }

    .jc-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.8rem;
    }

    .jc-headline {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .jc-body { padding: 28px 32px; }

    .jc-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--bg-2);
    }

    .jc-row:last-child { border-bottom: none; }

    .jc-check {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(74,59,79,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.75rem;
      color: var(--purple);
      font-weight: 700;
    }

    .jc-row-title { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .jc-row-sub { font-size: 0.75rem; color: var(--text-s); }

    /* ── PROCEDURES ── */
    .procedures { background: var(--purple); }

    .proc-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: end;
      margin-bottom: 4rem;
    }

    .procedures .section-kicker { color: var(--gold); }
    .procedures .section-kicker::before { background: var(--gold); }
    .procedures .section-title { color: var(--white); }
    .proc-header .section-lead { color: rgba(255,255,255,0.55); }

    .proc-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .proc-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 36px 32px;
      transition: background 0.3s, border-color 0.3s, transform 0.3s;
      cursor: default;
    }

    .proc-card:hover { background: rgba(255,255,255,0.09); border-color: rgba(201,185,156,0.35); transform: translateY(-4px); }

    .proc-icon { font-size: 1.8rem; margin-bottom: 1.4rem; display: block; }

    .proc-category {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.5rem;
    }

    .proc-tagline {
      font-size: 0.78rem;
      color: var(--gold);
      font-weight: 500;
      letter-spacing: 0.06em;
      margin-bottom: 1.4rem;
    }

    .proc-list { list-style: none; display: flex; flex-direction: column; gap: 0; }

    .proc-list li {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.5);
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: color 0.2s;
    }

    .proc-list li:last-child { border-bottom: none; }
    .proc-card:hover .proc-list li { color: rgba(255,255,255,0.7); }

    .proc-list li::before {
      content: '';
      width: 16px; height: 1px;
      background: var(--gold);
      flex-shrink: 0;
    }

    .proc-footer {
      margin-top: 1.6rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s, transform 0.3s;
    }

    .proc-card:hover .proc-footer { opacity: 1; transform: translateY(0); }

    /* ── WHY BRAZIL ── */
    .why-brazil { background: var(--bg); }

    .wb-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: center;
      margin-top: 4rem;
    }

    .wb-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 3rem;
    }

    .wb-stat-card {
      background: var(--white);
      border-radius: 12px;
      padding: 28px 24px;
      border: 1px solid rgba(74,59,79,0.06);
      box-shadow: 0 4px 16px rgba(74,59,79,0.05);
    }

    .wb-stat-card.full { grid-column: 1 / -1; }

    .wb-num {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--purple);
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .wb-unit { color: var(--gold); font-size: 1.4rem; }

    .wb-label { font-size: 0.78rem; color: var(--text-s); line-height: 1.5; }

    .wb-points { display: flex; flex-direction: column; gap: 1.2rem; }

    .wb-point {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .wb-check {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--gold);
      font-size: 0.65rem;
      font-weight: 700;
      margin-top: 2px;
    }

    .wb-point-title { font-size: 0.88rem; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .wb-point-desc { font-size: 0.78rem; color: var(--text-s); line-height: 1.65; }

    /* ── PARTNERS ── */
    .partners { background: var(--white); }

    .partners-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: end;
      margin-bottom: 4rem;
    }

    .partner-benefits {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 3.5rem;
    }

    .pb-card {
      background: var(--bg);
      border-radius: 12px;
      padding: 32px 28px;
      border: 1px solid transparent;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
    }

    .pb-card:hover { border-color: rgba(74,59,79,0.1); box-shadow: 0 10px 28px rgba(74,59,79,0.07); transform: translateY(-3px); }

    .pb-icon { font-size: 1.5rem; margin-bottom: 1.2rem; display: block; }

    .pb-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.6rem;
    }

    .pb-desc { font-size: 0.82rem; color: var(--text-s); line-height: 1.78; }

    .partner-cta-bar {
      background: var(--purple);
      border-radius: 16px;
      padding: 44px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }

    .pcb-kicker {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.6rem;
    }

    .pcb-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .pcb-form { display: flex; gap: 10px; flex-shrink: 0; }

    .pcb-input {
      padding: 13px 18px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
      width: 260px;
    }

    .pcb-input::placeholder { color: rgba(255,255,255,0.35); }
    .pcb-input:focus { border-color: var(--gold); }

    .btn-gold {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 13px 24px;
      background: var(--gold);
      color: var(--purple);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s;
      white-space: nowrap;
    }

    .btn-gold:hover { background: var(--gold-l); transform: translateY(-1px); }

    /* ── CTA / WAITLIST ── */
    .cta-section { text-align: center; padding: 120px 5vw; }

    .cta-section .section-kicker { justify-content: center; }
    .cta-section .section-kicker::before { display: none; }

    .cta-section .section-title { max-width: 600px; margin: 0 auto 1rem; }
    .cta-section .section-lead { max-width: 500px; margin: 0 auto 3rem; }

    .cta-waitlist-form {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cta-waitlist-form .waitlist-input { max-width: 300px; }

    .cta-note { font-size: 0.75rem; color: var(--text-s); margin-top: 1.6rem; letter-spacing: 0.02em; }

    /* ── FOOTER ── */
    footer {
      background: var(--text);
      padding: 44px 5vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-logo .logo-dot { background: var(--gold); }

    .footer-links { display: flex; gap: 2rem; list-style: none; }

    .footer-links a {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--gold); }

    .footer-copy { font-size: 0.72rem; color: rgba(255,255,255,0.22); }

    /* ── SAFETY VAULT ── */
    .safety-vault { background: var(--white); }

    .sv-intro {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: end;
      margin-bottom: 4rem;
    }

    .sv-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .sv-card {
      background: var(--bg);
      border-radius: 16px;
      padding: 40px 36px;
      border: 1px solid rgba(74,59,79,0.06);
      display: flex;
      gap: 1.6rem;
      align-items: flex-start;
      transition: box-shadow 0.3s, transform 0.3s;
    }

    .sv-card:hover { box-shadow: 0 14px 36px rgba(74,59,79,0.09); transform: translateY(-4px); }

    .sv-icon-wrap {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.25rem;
    }

    .sv-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.97rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.55rem;
    }

    .sv-desc { font-size: 0.82rem; color: var(--text-s); line-height: 1.78; }

    .sv-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 0.9rem;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(201,185,156,0.12);
      border: 1px solid rgba(201,185,156,0.3);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-content { animation: fadeUp 0.8s ease both; }
    .hero-visual  { animation: fadeUp 0.9s 0.18s ease both; }

    /* ── RESPONSIVE ── */
    @media (max-width: 960px) {
      .hero { grid-template-columns: 1fr; padding: calc(var(--banner-h) + 110px) 5vw 60px; }
      .hero-visual { display: none; }
      .vp-intro { grid-template-columns: 1fr; gap: 2rem; }
      .vp-grid { grid-template-columns: 1fr; }
      .journey-layout { grid-template-columns: 1fr; gap: 3rem; }
      .proc-header { grid-template-columns: 1fr; gap: 2rem; }
      .proc-grid { grid-template-columns: 1fr; }
      .wb-layout { grid-template-columns: 1fr; gap: 3rem; }
      .wb-stats { grid-template-columns: 1fr 1fr; }
      .sv-intro { grid-template-columns: 1fr; gap: 2rem; }
      .sv-grid { grid-template-columns: 1fr; }
      .sv-card { flex-direction: column; gap: 1rem; }
      .partners-header { grid-template-columns: 1fr; gap: 2rem; }
      .partner-benefits { grid-template-columns: 1fr; }
      .partner-cta-bar { flex-direction: column; text-align: center; }
      .pcb-input { width: 100%; }
      footer { flex-direction: column; gap: 1.6rem; text-align: center; }
      nav .nav-links { display: none; }
      .waitlist-form { flex-direction: column; }
    }
  </style>
</head>

    // Keys whose values are arrays → render as <li> elements
    const LIST_KEYS = ['p1.items','p2.items','p3.items','p4.items'];

    function setLanguage(lang) {
      if (!T[lang]) return;
      const tr = T[lang];
      document.documentElement.lang = lang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (tr[key] !== undefined) el.innerHTML = tr[key];
      });

      document.querySelectorAll('[data-i18n-list]').forEach(el => {
        const key = el.getAttribute('data-i18n-list');
        if (tr[key]) {
          el.innerHTML = tr[key].map(item => `<li>${item}</li>`).join('');
        }
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (tr[key] !== undefined) el.placeholder = tr[key];
      });

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      try { localStorage.setItem('aestyx-lang', lang); } catch(e) {}
    }

    function handleWaitlist(inputId, successId) {
      const input = document.getElementById(inputId);
      const success = document.getElementById(successId);
      if (!input || !input.value.includes('@')) {
        input.style.borderColor = 'var(--gold)';
        setTimeout(() => { input.style.borderColor = ''; }, 1500);
        return;
      }
      // Production: POST to /api/waitlist
      input.value = '';
      input.closest('.waitlist-form, .cta-waitlist-form, .pcb-form') && (input.style.display = 'none');
      input.style.display = 'none';
      success.style.display = 'block';
    }

    const saved = (() => { try { return localStorage.getItem('aestyx-lang'); } catch(e) { return null; } })();
    setLanguage(T[saved] ? saved : 'en');
  </script>
