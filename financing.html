      /* Format integer as $X,XXX */
      return '$' + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');

    function selectProcedure(proc) {
      var data = PROC_DATA[proc];
      if (!data) return;

      /* Update active button */
      document.querySelectorAll('.proc-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.proc === proc);
      });

      /* Update price displays */
      document.getElementById('us-price').textContent    = formatCurrency(data.us);
      document.getElementById('br-price').textContent    = formatCurrency(data.br_cash);
      document.getElementById('savings-pct').textContent = data.savings_pct + '%';
      document.getElementById('savings-bar').style.width = data.savings_pct + '%';

      var saved = data.us - data.br_cash;
      document.getElementById('savings-amount').textContent = formatCurrency(saved);

      if (window.T[lang]) Object.assign(window.T[lang], PAGE_T[lang]);
    });

    /* ── Render FAQ accordion ── */
    function renderFAQ(lang) {
      var list = document.getElementById('faq-list');
      if (!list) return;
      var items = FAQ_FINANCING[lang] || FAQ_FINANCING['en'];
      list.innerHTML = items.map(function(item) {
        return '<div class="faq-item">' +
          '<div class="faq-q" onclick="toggleFAQ(this)">' +
            '<span>' + item.q + '</span>' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>' +
          '</div>' +
          '<div class="faq-a">' + item.a + '</div>' +
        '</div>';
      }).join('');
    }

    function toggleFAQ(el) {
      var item = el.closest('.faq-item');
      document.querySelectorAll('.faq-item.open').forEach(function(other) {
        if (other !== item) other.classList.remove('open');
      });
      item.classList.toggle('open');
    }

    /* ── Page-level language change hook ── */
    window.onLanguageChange = function(lang) {
      renderFAQ(lang);
      /* Re-apply procedure button labels after language switch */
      var activeBtn = document.querySelector('.proc-btn.active');
      if (activeBtn) selectProcedure(activeBtn.dataset.proc);
    };

    /* ── Bootstrap ── */
    initPage();
    /* Default procedure */
