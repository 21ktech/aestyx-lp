<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aestyx — For Medical Partners</title>
  <meta name="description" content="Join Aestyx's invitation-only network. We deliver high-ticket global patients with structured clinical briefs, pre-qualified and ready.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <style>
    /* ===== V2: EARTHY PURPLE — MODERN SOPHISTICATION ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F4F3F5;
      --bg-2:      #EDECED;
      --bg-card:   #FFFFFF;
      --purple:    #4A3B4F;
      --purple-l:  #6D5B73;
      --purple-ll: #9A8A9F;
      --gold:      #C9B99C;
      --gold-l:    #E0D4C3;
      --lavender:  #B8AEBF;
      --text:      #1E1822;
      --text-s:    #5A5060;
      --white:     #FFFFFF;
      --banner-h:  38px;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── CONSTRUCTION BANNER ── */
    .construction-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 102;
      height: var(--banner-h);
      background: var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .phase-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(201,185,156,0.15);
      border: 1px solid rgba(201,185,156,0.45);
      color: var(--gold);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .phase-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .banner-text {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.35; transform: scale(0.7); }
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: var(--banner-h); left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5vw;
      height: 68px;
      background: rgba(244,243,245,0.9);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(74,59,79,0.08);
    }

    .nav-logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.26em;
      color: var(--purple);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }

    .nav-links { display: flex; gap: 2.2rem; list-style: none; }

    .nav-links a {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-s);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--purple); }

    .nav-right { display: flex; align-items: center; gap: 1rem; }

    .lang-selector { display: flex; gap: 4px; }

    .lang-btn {
      background: none;
      border: 1px solid rgba(74,59,79,0.18);
      color: var(--text-s);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 4px 9px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .lang-btn:hover { border-color: var(--purple); color: var(--purple); }
    .lang-btn.active { background: var(--purple); color: var(--white); border-color: var(--purple); }

    .nav-cta {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 22px;
      background: var(--purple);
      color: var(--white);
      text-decoration: none;
      border-radius: 4px;
      transition: background 0.25s, transform 0.2s;
    }

    .nav-cta:hover { background: var(--text); transform: translateY(-1px); }

    /* ── PAGE HERO (PARTNERS) ── */
    .page-hero {
      padding: calc(var(--banner-h) + 110px) 5vw 80px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      gap: 5rem;
      min-height: 52vh;
    }

    .page-hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(201,185,156,0.1);
      border: 1px solid rgba(201,185,156,0.35);
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 1.8rem;
    }

    .eyebrow-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: pulse-dot 2s ease-in-out infinite; }

    .page-hero h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2.4rem, 3.8vw, 3.6rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 1.6rem;
      letter-spacing: -0.025em;
    }

    .page-hero h1 .highlight {
      color: var(--purple);
      position: relative;
      display: inline-block;
    }

    .page-hero h1 .highlight::after {
      content: '';
      position: absolute;
      bottom: 3px; left: 0; right: 0;
      height: 2px;
      background: var(--gold);
    }

    .page-hero-sub {
      font-size: 1rem;
      color: var(--text-s);
      line-height: 1.85;
      max-width: 500px;
      margin-bottom: 2.4rem;
    }

    /* stat cards in hero visual */
    .ph-visual { display: flex; flex-direction: column; gap: 1rem; }

    .ph-stat-card {
      background: var(--white);
      border-radius: 14px;
      padding: 24px 28px;
      border: 1px solid rgba(74,59,79,0.07);
      box-shadow: 0 6px 24px rgba(74,59,79,0.07);
      display: flex;
      align-items: center;
      gap: 1.4rem;
    }

    .ph-stat-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .ph-stat-icon svg { width: 22px; height: 22px; stroke: var(--white); stroke-width: 1.5; }

    .ph-stat-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-s); margin-bottom: 2px; }
    .ph-stat-val { font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); }

    /* ── SECTION SHARED ── */
    section { padding: 96px 5vw; }

    .section-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .section-kicker::before { content: ''; width: 24px; height: 1px; background: var(--gold); }

    .section-title {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(1.9rem, 2.8vw, 2.6rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 1.2rem;
    }

    .section-title .accent { color: var(--purple); }

    .section-lead {
      font-size: 0.95rem;
      color: var(--text-s);
      line-height: 1.85;
    }

    /* ── PARTNER BENEFITS ── */
    .partners { background: var(--white); }

    .partners-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: end;
      margin-bottom: 4rem;
    }

    .partner-benefits {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 3.5rem;
    }

    .pb-card {
      background: var(--bg);
      border-radius: 12px;
      padding: 36px 28px;
      border: 1px solid transparent;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
    }

    .pb-card:hover { border-color: rgba(74,59,79,0.1); box-shadow: 0 10px 28px rgba(74,59,79,0.07); transform: translateY(-3px); }

    .pb-icon { font-size: 1.5rem; margin-bottom: 1.4rem; display: block; }
    .pb-icon svg { width: 26px; height: 26px; stroke: var(--purple); stroke-width: 1.5; }

    .pb-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.8rem;
    }

    .pb-desc { font-size: 0.82rem; color: var(--text-s); line-height: 1.78; }

    /* ── VERIFICATION PROCESS ── */
    .verification { background: var(--bg); }

    .ver-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 3.5rem;
    }

    .ver-card {
      background: var(--white);
      border-radius: 14px;
      padding: 36px 30px;
      border: 1px solid rgba(74,59,79,0.06);
      text-align: center;
      position: relative;
    }

    .ver-step {
      font-family: 'Montserrat', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      color: rgba(74,59,79,0.08);
      line-height: 1;
      margin-bottom: 1rem;
    }

    .ver-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
    }

    .ver-icon svg { width: 20px; height: 20px; stroke: var(--white); stroke-width: 1.5; }

    .ver-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .ver-desc { font-size: 0.8rem; color: var(--text-s); line-height: 1.75; }

    .ver-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 1rem;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(201,185,156,0.12);
      border: 1px solid rgba(201,185,156,0.3);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── APPLY CTA BAR ── */
    .partner-cta-bar {
      background: var(--purple);
      border-radius: 16px;
      padding: 48px 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      margin-top: 4rem;
    }

    .pcb-kicker {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.6rem;
    }

    .pcb-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .pcb-form { display: flex; gap: 10px; flex-shrink: 0; }

    .pcb-input {
      padding: 13px 18px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
      width: 260px;
    }

    .pcb-input::placeholder { color: rgba(255,255,255,0.35); }
    .pcb-input:focus { border-color: var(--gold); }

    .btn-gold {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 13px 24px;
      background: var(--gold);
      color: var(--purple);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s;
      white-space: nowrap;
    }

    .btn-gold:hover { background: var(--gold-l); transform: translateY(-1px); }

    .waitlist-success {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: var(--gold);
      font-weight: 500;
      letter-spacing: 0.02em;
      text-align: center;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--text);
      padding: 44px 5vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .footer-logo .logo-dot { background: var(--gold); }

    .footer-links { display: flex; gap: 2rem; list-style: none; }

    .footer-links a {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover, .footer-links a.active { color: var(--gold); }

    .footer-copy { font-size: 0.72rem; color: rgba(255,255,255,0.22); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-hero-content { animation: fadeUp 0.8s ease both; }
    .ph-visual { animation: fadeUp 0.9s 0.18s ease both; }

    /* ── RESPONSIVE ── */
    @media (max-width: 960px) {
      .page-hero { grid-template-columns: 1fr; padding: calc(var(--banner-h) + 110px) 5vw 60px; }
      .ph-visual { display: none; }
      .partners-header { grid-template-columns: 1fr; gap: 2rem; }
      .partner-benefits { grid-template-columns: 1fr; }
      .ver-grid { grid-template-columns: 1fr; }
      .partner-cta-bar { flex-direction: column; text-align: center; }
      .pcb-input { width: 100%; }
      footer { flex-direction: column; gap: 1.6rem; text-align: center; }
      nav .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <!-- CONSTRUCTION BANNER -->
  <div class="construction-banner">
    <div class="phase-pill">
      <div class="phase-dot"></div>
      <span data-i18n="phase.label"></span>
    </div>
    <span class="banner-text" data-i18n="banner"></span>
  </div>

  <!-- NAV -->
  <nav>
    <a href="../index.html" class="nav-logo">
      <span class="logo-dot"></span>
      AESTYX
    </a>
    <ul class="nav-links">
      <li><a href="../index.html#value" data-i18n="nav.value"></a></li>
      <li><a href="../index.html#security" data-i18n="nav.security"></a></li>
      <li><a href="../index.html#procedures" data-i18n="nav.procedures"></a></li>
      <li><a href="../index.html#brazil" data-i18n="nav.brazil"></a></li>
      <li><a href="partners.html" class="active" data-i18n="nav.partners"></a></li>
    </ul>
    <div class="nav-right">
      <div class="lang-selector">
        <button class="lang-btn active" data-lang="en" onclick="setLanguage('en')">EN</button>

        <button class="lang-btn" data-lang="es" onclick="setLanguage('es')">ES</button>
      </div>
      <a href="../index.html#waitlist" class="nav-cta" data-i18n="nav.cta"></a>
    </div>
  </nav>

  <!-- ══ PAGE HERO ══ -->
  <div class="page-hero">
    <div class="page-hero-content">
      <div class="page-hero-eyebrow">
        <div class="eyebrow-dot"></div>
        <span data-i18n="part.eyebrow"></span>
      </div>
      <h1 data-i18n="part.h1"></h1>
      <p class="page-hero-sub" data-i18n="part.h1sub"></p>
    </div>
    <div class="ph-visual">
      <div class="ph-stat-card">
        <div class="ph-stat-icon"><i data-lucide="globe"></i></div>
        <div>

        </div>
      </div>
      <div class="ph-stat-card">
        <div class="ph-stat-icon"><i data-lucide="file-text"></i></div>
        <div>
          <div class="ph-stat-label" data-i18n="ph.s2.label"></div>
          <div class="ph-stat-val" data-i18n="ph.s2.val"></div>
        </div>
      </div>
      <div class="ph-stat-card">
        <div class="ph-stat-icon"><i data-lucide="badge-check"></i></div>
        <div>
          <div class="ph-stat-label" data-i18n="ph.s3.label"></div>
          <div class="ph-stat-val" data-i18n="ph.s3.val"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ PARTNER BENEFITS ══ -->
  <section class="partners" id="partners">
    <div class="partners-header">
      <div>
        <div class="section-kicker" data-i18n="part.kicker"></div>
        <div class="section-title" data-i18n="part.title"></div>

        <p class="pb-desc" data-i18n="pb1.desc"></p>

        <span class="pb-icon"><i data-lucide="file-text"></i></span>
        <div class="pb-title" data-i18n="pb2.title"></div>
        <p class="pb-desc" data-i18n="pb2.desc"></p>
      </div>
      <div class="pb-card">
        <span class="pb-icon"><i data-lucide="badge-check"></i></span>
        <div class="pb-title" data-i18n="pb3.title"></div>
        <p class="pb-desc" data-i18n="pb3.desc"></p>
      </div>
    </div>

    <div class="partner-cta-bar">
      <div class="pcb-left">
        <div class="pcb-kicker" data-i18n="pcb.kicker"></div>

      </div>
      <div class="ver-card">

        <div class="ver-icon"><i data-lucide="shield-check"></i></div>
        <div class="ver-title" data-i18n="ver3.title"></div>
        <p class="ver-desc" data-i18n="ver3.desc"></p>
        <div class="ver-badge" data-i18n="ver3.badge"></div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <a href="../index.html" class="footer-logo"><span class="logo-dot"></span>AESTYX</a>
    <ul class="footer-links">
      <li><a href="#" data-i18n="footer.privacy"></a></li>

      <li><a href="#" data-i18n="footer.contact"></a></li>
    </ul>
    <div class="footer-copy" data-i18n="footer.copy"></div>
  </footer>

  <script>
    const T = {
      en: {
        'phase.label': 'Phase 1',
        'phase.badge': 'Phase 1: Launching Soon',
        'banner':      'Join the Elite Waitlist — early access closing soon',

    function setLanguage(lang) {
      if (!T[lang]) return;
      const tr = T[lang];
      document.documentElement.lang = lang;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (tr[key] !== undefined) el.innerHTML = tr[key];
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (tr[key] !== undefined) el.placeholder = tr[key];
      });

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      try { localStorage.setItem('aestyx-lang', lang); } catch(e) {}

      // Re-init icons after innerHTML updates
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function handleWaitlist(inputId, successId) {
      const input = document.getElementById(inputId);
      const success = document.getElementById(successId);
      if (!input || !input.value.includes('@')) {
        input.style.borderColor = 'var(--gold)';
        setTimeout(() => { input.style.borderColor = ''; }, 1500);
        return;
      }
      input.value = '';
      input.style.display = 'none';
      success.style.display = 'block';
    }

    const saved = (() => { try { return localStorage.getItem('aestyx-lang'); } catch(e) { return null; } })();
    setLanguage(T[saved] ? saved : 'en');

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });
  </script>
