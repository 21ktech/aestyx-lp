          a: 'Solo t&uacute; &mdash; y el cirujano verificado espec&iacute;fico que elijas compartirlo. Nuestra IA procesa todo el an&aacute;lisis de fotos de forma an&oacute;nima, sin revisi&oacute;n humana. Tu Blueprint&#8482; nunca se comparte con otras cl&iacute;nicas, se usa para publicidad ni se vende a terceros.'
        },
        {
          q: '&iquest;C&oacute;mo verifica Aestyx las credenciales de los especialistas?',
          a: 'Cada especialista en la red Aestyx pasa por una auditor&iacute;a de tres niveles: (1) CRM activo en el Consejo Regional de Medicina, (2) c&oacute;digo RQE confirmando la especialidad quir&uacute;rgica espec&iacute;fica, y (3) cumplimiento sanitario de las instalaciones seg&uacute;n est&aacute;ndares ANVISA. Esta auditor&iacute;a triple se requiere antes de la admisi&oacute;n y se renueva peri&oacute;dicamente.'
        }
      ]
    };

    Object.keys(PAGE_T).forEach(function(lang) {
      if (window.T[lang]) Object.assign(window.T[lang], PAGE_T[lang]);
    });

    function renderFAQ(lang) {
      var list = document.getElementById('faq-list');
      if (!list) return;
      var items = FAQ_T[lang] || FAQ_T['en'];
      list.innerHTML = items.map(function(item) {
        return '<div class="faq-item">' +
          '<div class="faq-q" onclick="toggleFAQ(this)">' +
            '<span>' + item.q + '</span>' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>' +
          '</div>' +
          '<div class="faq-a">' + item.a + '</div>' +
        '</div>';
      }).join('');
    }

    function toggleFAQ(el) {
      var item = el.closest('.faq-item');
      document.querySelectorAll('.faq-item.open').forEach(function(other) {
        if (other !== item) other.classList.remove('open');
      });
      item.classList.toggle('open');
    }

    window.onLanguageChange = function(lang) { renderFAQ(lang); };

    initPage();
  </script>
</body>
</html>
