<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aestyx Club &mdash; Me vs Me</title>
  <meta name="description" content="Aestyx Club — Performance tracking and 'Me vs Me' gamification. Your aesthetic evolution, quantified and celebrated over time.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .club-coming-soon {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(201,185,156,0.1);
      border: 1px solid rgba(201,185,156,0.35);
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 1.8rem;
    }
    .club-coming-soon-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .club-score-preview {
      background: var(--purple);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .club-score-preview::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(201,185,156,0.06);
    }
    .csp-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .csp-score {
      font-family: 'Montserrat', sans-serif;
      font-size: 5rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .csp-score span { font-size: 2rem; color: var(--gold); }
    .csp-sublabel {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .csp-progress {
      margin-top: 2rem;
    }
    .csp-progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 0.6rem;
    }
    .csp-bar-bg {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .csp-bar-fill {
      height: 100%;
      width: 84%;
      background: linear-gradient(90deg, var(--gold), rgba(201,185,156,0.6));
      border-radius: 3px;
    }
    .csp-delta {
      margin-top: 1.4rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.55);
    }
    .csp-delta strong { color: var(--gold); }
  </style>
</head>

  <div class="construction-banner">

    <p class="cta-note" data-i18n="cta.note"></p>
  </section>
